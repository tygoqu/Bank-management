<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Bank Quest – Ultimate Edition</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
:root {
  --bg-dark: #090c15; --bg-mid: #151a2a; --bg-light: #252d47;
  --accent: #3b82f6; --gold: #fbbf24; --green: #4ade80; --red: #f87171;
  --text: #f8fafc; --text-dim: #94a3b8;
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: none; }
html, body { 
  width: 100%; height: 100dvh; overflow: hidden; 
  background: var(--bg-dark); font-family: 'Press Start 2P', monospace; 
  overscroll-behavior: none; 
}
#c { display: block; image-rendering: pixelated; image-rendering: crisp-edges; width: 100%; height: 100%; }

#portrait-lock {
  position: fixed; inset: 0; background: #000; color: #fff; z-index: 9999;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  text-align: center; padding: 20px;
}
.rotate-icon { font-size: 40px; margin-bottom: 20px; animation: rotatePhone 2s infinite ease-in-out; }
@keyframes rotatePhone { 0% { transform: rotate(0deg); } 50% { transform: rotate(-90deg); } 100% { transform: rotate(0deg); } }
@media (orientation: landscape) { #portrait-lock { display: none !important; } }
@media (orientation: portrait) { #ui, #title, #mg-sheet { display: none !important; } }

#ui { position: fixed; inset: 0; pointer-events: none; z-index: 10; padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); }

#top-bar { position: absolute; top: 12px; left: 12px; right: 12px; display: flex; justify-content: space-between; align-items: flex-start; z-index: 20; pointer-events: none; }
.hud-box { background: rgba(15, 23, 42, 0.9); border: 2px solid var(--accent); border-radius: 8px; padding: 10px 14px; pointer-events: all; display: flex; flex-direction: column; gap: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.8); }
.hud-row { display: flex; align-items: center; gap: 8px; font-size: 10px; color: var(--text-dim); }
.hud-v { color: var(--gold); transition: transform 0.1s; }
.sys-btns { display: flex; gap: 8px; pointer-events: all; }
.sys-btn { width: 44px; height: 44px; background: rgba(15, 23, 42, 0.9); border: 2px solid var(--text-dim); border-radius: 8px; color: var(--text); display: flex; align-items: center; justify-content: center; font-size: 18px; cursor: pointer; transition: 0.1s; }
.sys-btn:active { background: var(--bg-light); transform: scale(0.9); }

#dlg { position: absolute; bottom: 12px; left: 12px; right: 12px; background: rgba(9, 12, 21, 0.95); border: 3px solid var(--gold); border-radius: 12px; padding: 0; transform: translateY(150%); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 50; pointer-events: all; display: flex; flex-direction: column; max-height: calc(100dvh - 90px); box-shadow: 0 10px 30px rgba(0,0,0,0.9); }
#dlg.open { transform: translateY(0); }
#dlg-inner { display: flex; gap: 14px; padding: 16px; border-bottom: 2px solid var(--bg-light); align-items: flex-start; }
#dlg-face { width: 64px; height: 64px; flex-shrink: 0; border: 2px solid var(--gold); background: #000; border-radius: 8px; image-rendering: pixelated; }
#dlg-name { font-size: 11px; color: var(--gold); margin-bottom: 8px; text-shadow: 1px 1px 0 #000; line-height: 1.4; }
#dlg-text { font-size: 10px; color: var(--text); line-height: 1.7; flex: 1; }
#dlg-choices { display: flex; flex-direction: column; overflow-y: auto; max-height: 35dvh; }
.dlg-choice { background: transparent; border: none; border-bottom: 1px solid var(--bg-light); padding: 16px; color: var(--text-dim); font-family: inherit; font-size: 9px; text-align: left; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: 0.1s; line-height: 1.6; }
.dlg-choice:last-child { border-bottom: none; }
.dlg-choice:active, .dlg-choice:hover { background: rgba(59, 130, 246, 0.2); color: var(--gold); padding-left: 20px; }
.dlg-choice.ok { color: var(--green); } .dlg-choice.ng { color: var(--red); }
#dlg-cont { font-size: 9px; color: var(--text-dim); padding: 12px; text-align: center; animation: blink 1s infinite; cursor: pointer; background: var(--bg-mid); border-radius: 0 0 8px 8px; }
@keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0.5; } }

#ctrl { position: absolute; bottom: 16px; left: 16px; right: 16px; display: none; justify-content: space-between; align-items: flex-end; pointer-events: none; z-index: 40; }
.dpad { display: flex; gap: 12px; pointer-events: all; }
.dpb { width: 64px; height: 64px; background: rgba(255,255,255,0.15); border: 3px solid rgba(255,255,255,0.4); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 28px; color: #fff; opacity: 0.8; user-select: none; transition: 0.1s; }
.dpb.on, .dpb:active { background: rgba(255,255,255,0.4); transform: scale(0.9); opacity: 1; }
.acts { display: flex; gap: 14px; pointer-events: all; }
.abtn { width: 68px; height: 68px; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: inherit; font-size: 9px; font-weight: bold; user-select: none; box-shadow: 0 6px 0 rgba(0,0,0,0.6); transition: 0.1s; border: 4px solid; cursor: pointer; }
.abtn:active { transform: translateY(6px); box-shadow: 0 0 0 rgba(0,0,0,0); }
#abtn-b { background: #3b82f6; border-color: #60a5fa; color: #fff; } /* JUMP */
#abtn-a { background: #fbbf24; border-color: #fde047; color: #000; width: 80px; height: 80px; font-size: 11px; } /* ACTION */

#mg-sheet { position: fixed; inset: 0; background: var(--bg-dark); z-index: 60; transform: translateY(100%); transition: transform 0.3s ease-out; overflow-y: auto; pointer-events: all; display: flex; flex-direction: column; }
#mg-sheet.open { transform: translateY(0); }
.mg-hdr { background: var(--bg-mid); border-bottom: 2px solid var(--accent); padding: 16px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 2; }
.mg-title { font-size: 12px; color: var(--gold); margin-bottom: 6px; }
.mg-sub { font-size: 9px; color: var(--text-dim); }
.mg-close { background: var(--bg-dark); border: 2px solid var(--text-dim); color: var(--text); padding: 12px 16px; font-family: inherit; font-size: 9px; border-radius: 6px; cursor: pointer; }
.mg-close:active { background: var(--text-dim); color: #000; }
.mg-body { padding: 20px; flex: 1; display: flex; flex-direction: column; gap: 16px; max-width: 600px; margin: 0 auto; width: 100%; }

.card { background: var(--bg-mid); border: 2px solid var(--bg-light); border-radius: 8px; padding: 20px; }
.lbl { font-size: 10px; color: var(--accent); margin-bottom: 12px; display: block; line-height: 1.5; }
.row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px dashed var(--bg-light); font-size: 10px; color: var(--text); }
.row:last-child { border-bottom: none; }
.btn { width: 100%; background: var(--accent); border: none; border-bottom: 4px solid #2563eb; color: #fff; font-family: inherit; font-size: 11px; padding: 18px; border-radius: 8px; cursor: pointer; transition: 0.1s; margin-top: 10px; }
.btn:active { transform: translateY(4px); border-bottom-width: 0; }
.btn.gold { background: var(--gold); border-bottom-color: #d97706; color: #000; }

.term-p { font-size: 10px; color: var(--text); line-height: 1.8; margin-bottom: 12px; }
.term-hl { color: var(--green); }
.res-box { padding: 16px; border-radius: 8px; font-size: 10px; line-height: 1.6; margin-top: 10px; border: 2px solid; display: none; }
.res-box.ok { display: block; background: rgba(74, 222, 128, 0.1); border-color: var(--green); color: var(--green); }

.lb-row { display: flex; justify-content: space-between; padding: 14px; border-bottom: 1px solid var(--bg-light); font-size: 10px; color: var(--text); }
.lb-row.me { background: rgba(251, 191, 36, 0.15); color: var(--gold); font-weight: bold; border: 2px solid var(--gold); border-radius: 6px; }

#title { position: fixed; inset: 0; background: var(--bg-dark); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; overflow-y: auto; }
.t-logo { font-size: clamp(28px, 8vw, 56px); color: #fff; margin-bottom: 10px; text-shadow: 0 6px 20px rgba(59, 130, 246, 0.6); line-height: 1.2; }
.t-logo span { color: var(--gold); }
.av-row { display: flex; gap: 16px; justify-content: center; margin: 20px 0; }
.av-opt { width: 64px; height: 64px; background: var(--bg-mid); border: 3px solid var(--bg-light); border-radius: 12px; cursor: pointer; image-rendering: pixelated; transition: 0.1s; }
.av-opt.sel { border-color: var(--gold); background: rgba(251, 191, 36, 0.2); transform: scale(1.15); }
#name-inp { max-width: 280px; text-align: center; font-size: 11px; background: var(--bg-dark); border: 2px solid var(--bg-light); color: var(--text); font-family: inherit; padding: 14px; border-radius: 6px; margin-bottom: 10px; outline: none; }
#name-inp:focus { border-color: var(--accent); }

@media (max-height: 450px) {
  #dlg { max-height: calc(100dvh - 70px); }
  .dpb { width: 54px; height: 54px; font-size: 24px; }
  .abtn { width: 58px; height: 58px; font-size: 8px; }
  #abtn-a { width: 68px; height: 68px; font-size: 9px; }
  .t-logo { font-size: 32px; }
  .av-opt { width: 56px; height: 56px; }
  #name-inp { padding: 10px; font-size: 9px; }
  .btn { padding: 14px; font-size: 9px; }
}
</style>
</head>

<div id="portrait-lock">

<canvas id="c"></canvas>

<div id="ui">

  <input id="name-inp" placeholder="ТОГЛОГЧИЙН НЭР" maxlength="12" value="ТОГЛОГЧ">
  
  <div style="font-size:9px;color:var(--text-dim);margin-top:10px">АВАТАР СОНГОХ</div>
  <div class="av-row">

    <canvas class="av-opt" id="av2" onclick="selAv(2)"></canvas>

  <button class="btn gold" style="max-width:280px" onclick="startGame()">▶ ТОГЛООМ ЭХЛЭХ</button>

const SCALE = 5; 
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  W = window.innerWidth; H = window.innerHeight;

  ctx.imageSmoothingEnabled = false;
}

// Draw pixel art with a solid black outline for that "built" 32x32 look
function drawSprite(ctx, spr, wx, wy, palOvr, flip, scl = SCALE) {
  const size = spr.length;
  ctx.fillStyle = '#000';
  for (let r = 0; r < size; r++) {
    for (let c = 0; c < size; c++) {
      if (!spr[r] || spr[r][flip ? size-1-c : c] === undefined) continue;
      let p = spr[r][flip ? size-1-c : c];
      if (p !== 0) {
        ctx.fillRect(wx + c*scl - scl, wy + r*scl, scl, scl);
        ctx.fillRect(wx + c*scl + scl, wy + r*scl, scl, scl);
        ctx.fillRect(wx + c*scl, wy + r*scl - scl, scl, scl);
        ctx.fillRect(wx + c*scl, wy + r*scl + scl, scl, scl);
      }
    }
  }
  for (let r = 0; r < size; r++) {
    for (let c = 0; c < size; c++) {
      if (!spr[r] || spr[r][flip ? size-1-c : c] === undefined) continue;
      let pidx = spr[r][flip ? size-1-c : c];
      if (pidx === 0) continue;
      const rgba = (palOvr && palOvr[pidx]) ? palOvr[pidx] : PAL[pidx];
      ctx.fillStyle = `rgba(${rgba[0]},${rgba[1]},${rgba[2]},${rgba[3]/255})`;
      ctx.fillRect(wx + c*scl, wy + r*scl, scl, scl);
    }
  }
}

let parts = [];
function addParts(x, y, color, amt=10, isBurst=true) {
  for(let i=0; i<amt; i++) {
    parts.push({
      x, y, vx: (Math.random()-0.5)* (isBurst?8:3), vy: (Math.random()-0.5)*(isBurst?8:3) - (isBurst?3:0),
      life: 30 + Math.random()*20, col: color
    });
  }
}
function updateParts() {
  parts = parts.filter(p => {
    p.x += p.vx; p.y += p.vy; p.vy += 0.3; p.life--;
    if(p.life>0) {
      ctx.fillStyle = p.col; ctx.globalAlpha = p.life/50;
      ctx.fillRect(Math.round(p.x), Math.round(p.y), SCALE, SCALE);
    }
    return p.life>0;
  });
  ctx.globalAlpha = 1;
}

let fTexts = [];
function addFText(tx, x, y, col) {

let activeLvl = LEVELS[0];

function render() {
  if(GS.phase === 'title' || GS.phase === 'map' || GS.phase === 'lb') return;
  
  if(GS.phase === 'playing') {
    if(inp.l) { plr.wx -= plr.spd; plr.facing = -1; }
    if(inp.r) { plr.wx += plr.spd; plr.facing = 1; }
    plr.wx = Math.max(20, Math.min(activeLvl.w - 20, plr.wx));

    if(inp.jump && !plr.isJumping) {
      plr.vy = -10; plr.isJumping = true;
      addParts(plr.wx - camX, getFloorY(), '#fff', 5, false);
    }
    plr.y += plr.vy; plr.vy += 0.5; // Gravity
    if(plr.y >= 0) { 
      if(plr.isJumping) addParts(plr.wx - camX, getFloorY(), '#fff', 5, false);
      plr.y = 0; plr.vy = 0; plr.isJumping = false; 
    }
    
    // Smooth camera lerp
    let targetCamX = plr.wx - W/2;
    targetCamX = Math.max(0, Math.min(activeLvl.w - W, targetCamX));
    camX += (targetCamX - camX) * 0.1;
  }

  floatT += 0.05;
  const FY = getFloorY();
  const CEIL_Y = Math.floor(H * 0.20);
  
  if (screenShake > 0) {
    ctx.save();
    ctx.translate((Math.random()-0.5)*screenShake, (Math.random()-0.5)*screenShake);
    screenShake--;
  } else { ctx.save(); }

  // Parallax Background
  ctx.fillStyle = activeLvl.bg1; ctx.fillRect(0,0,W,CEIL_Y);
  
  for(let lx = 80; lx < W + camX%200; lx+=200) {
    const sx = lx - (camX*0.3)%200; // Parallax
    ctx.fillStyle = 'rgba(251, 191, 36, 0.15)';
    ctx.fillRect(sx - 20, CEIL_Y - 4, 40, 6);
    ctx.beginPath(); ctx.moveTo(sx-20, CEIL_Y+2); ctx.lineTo(sx-80, FY); ctx.lineTo(sx+80, FY); ctx.lineTo(sx+20, CEIL_Y+2);
    ctx.fillStyle = 'rgba(251, 191, 36, 0.02)'; ctx.fill();
  }

  // Wall
  ctx.fillStyle = activeLvl.bg2; ctx.fillRect(0, CEIL_Y, W, FY-CEIL_Y);
  ctx.strokeStyle = 'rgba(255,255,255,0.03)'; ctx.lineWidth = 2;
  const tileScl = 100;
  for(let ty = CEIL_Y; ty < FY; ty += tileScl) {
    for(let tx = -(camX*0.8%tileScl) - tileScl; tx < W+tileScl; tx+=tileScl) {
      ctx.strokeRect(tx, ty, tileScl, tileScl);
    }
  }

  // Floor
  ctx.fillStyle = activeLvl.floor; ctx.fillRect(0, FY, W, H-FY);
  ctx.fillStyle = '#1e293b'; ctx.fillRect(0, FY, W, 4);
  ctx.strokeStyle = 'rgba(255,255,255,0.05)'; ctx.lineWidth=2;
  const offX = -camX % 80;
  for(let x=offX-80; x<W+200; x+=80) {
    ctx.beginPath(); ctx.moveTo(x, FY); ctx.lineTo(x-150, H); ctx.stroke();
  }

  // Decorations
  if(activeLvl.deco) {
    activeLvl.deco.forEach(d => {
      const cx = d.wx - camX;
      if(cx > -100 && cx < W+100) {
        drawSprite(ctx, d.spr, cx - 8*SCALE, FY - 16*SCALE, null, false);
        
        if (d.isComp && Math.abs(plr.wx - d.wx) < 70 && plr.y > -20) {
          const bob = Math.sin(floatT*2)*3;
          ctx.fillStyle = 'rgba(15, 23, 42, 0.9)'; ctx.fillRect(cx - 36, FY - 90 + bob, 72, 20);
          ctx.fillStyle = '#4ade80'; ctx.font = "9px 'Press Start 2P', monospace";
          ctx.fillText("ТЕРМИНАЛ", cx - 28, FY - 76 + bob);
        }
      }
    });
  }

  // Door
  if(activeLvl.door) {
    const dx = activeLvl.door.wx - camX;
    if(dx > -100 && dx < W+100) {
      ctx.shadowColor = '#fbbf24'; ctx.shadowBlur = 15 + Math.sin(floatT)*5;
      drawSprite(ctx, SPR_DOOR, dx - 8*SCALE, FY - 16*SCALE, null, false);
      ctx.shadowBlur = 0;
      if(Math.abs(plr.wx - activeLvl.door.wx) < 70 && plr.y > -20) {
        const bob = Math.sin(floatT*2)*3;
        ctx.fillStyle = 'rgba(15, 23, 42, 0.9)'; ctx.fillRect(dx - 30, FY - 100 + bob, 60, 20);
        ctx.fillStyle = '#fbbf24'; ctx.font = "9px 'Press Start 2P', monospace";
        ctx.fillText("ОРОХ", dx - 16, FY - 86 + bob);
      }
    }
  }

  // Coins
  activeLvl.coins.forEach(c => {
    if(c.collected) return;
    const cx = c.wx - camX;
    if(cx > -50 && cx < W+50) {
      const cy = FY + c.y + Math.sin(floatT+c.wx)*6;
      drawSprite(ctx, SPR_COIN, cx-4*SCALE, cy, null, false, 4);
      if(Math.abs(plr.wx - c.wx)<40 && Math.abs(plr.y - c.y)<40) {
        c.collected = true;
        addParts(c.wx - camX, cy, '#fbbf24', 15);
        addFText('+₮1,500', c.wx, FY + c.y, '#fbbf24');
        earnPts(10, 'ЗООС'); GS.balance += 1500; updateHUD();
      }
    }
  });

  // NPCs
  activeLvl.npcs.forEach((n, ni) => {
    const nx = n.wx - camX;
    if(nx > -100 && nx < W+100) {
      const bob = Math.sin(floatT*2 + ni)*2;
      const ny = FY - 16*SCALE;
      
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.beginPath(); ctx.ellipse(nx, FY, 20, 5, 0, 0, Math.PI*2); ctx.fill();

      drawSprite(ctx, SPR_PLAYER, nx - 8*SCALE, ny + bob, n.p, false);
      
      if(!GS.done.has(n.id)) {
        if(Math.abs(plr.wx - n.wx) < 80) {
          ctx.fillStyle = 'rgba(15, 23, 42, 0.9)'; ctx.fillRect(nx - 24, ny - 35 + bob, 48, 20);
          ctx.fillStyle = '#fbbf24'; ctx.font = "9px 'Press Start 2P', monospace";
          ctx.fillText("ЯРИХ", nx - 16, ny - 21 + bob);
        } else {
          ctx.fillStyle = '#fbbf24'; ctx.font = "12px 'Press Start 2P', monospace";
          ctx.fillText('▼', nx-6, ny-15 + bob);
        }
      }
    }
  });

  // Player
  const px = plr.wx - camX;
  const py = FY - 16*SCALE + plr.y;
  
  ctx.fillStyle = `rgba(0,0,0,${Math.max(0.1, 0.5 + plr.y/200)})`;
  ctx.beginPath(); ctx.ellipse(px, FY, 20 + plr.y/10, 5 + plr.y/20, 0, 0, Math.PI*2); ctx.fill();

  if(inp.l || inp.r) {
    plr.timer++;
    if(plr.timer > 5) { plr.timer = 0; plr.frame = (plr.frame + 1) % 4; addParts(px, FY, 'rgba(255,255,255,0.2)', 1, false); }
  } else plr.frame = 0;

  let pSpr = SPR_PLAYER;
  if(plr.isJumping) pSpr = SPR_PL_W1;
  else if(inp.l || inp.r) pSpr = [SPR_PL_W1, SPR_PLAYER, SPR_PL_W1, SPR_PLAYER][plr.frame]; // Simplified walk cycle
  
  drawSprite(ctx, pSpr, px - 8*SCALE, py, getPal(GS.av), plr.facing === -1);

  // Particles & Text
  updateParts();
  fTexts = fTexts.filter(t => {
    t.y -= 1.5; t.life--;
    ctx.fillStyle = t.col; ctx.globalAlpha = t.life/70;
    ctx.font = "10px 'Press Start 2P', monospace";
    ctx.fillText(t.tx, t.x - camX - 20, t.y);
    return t.life > 0;
  });
  ctx.globalAlpha = 1;

  ctx.restore();
}

let npcCool = 0;
function interact() {
  if(GS.phase === 'dlg') { advDlg(); return; }
  if(GS.phase !== 'playing' || Date.now() < npcCool) return;
  
  const comp = activeLvl.deco?.find(d => d.isComp && Math.abs(d.wx - plr.wx) < 70 && plr.y > -20);
  if(comp) { npcCool = Date.now() + 500; openComputer(); return; }

  const hit = activeLvl.npcs.find(n => Math.abs(n.wx - plr.wx) < 80 && plr.y > -20);
  if(hit) {
    npcCool = Date.now() + 500;
    if(GS.done.has(hit.id)) { toast('🔒 ТА ЭНЭ ДААЛГАВРЫГ ХИЙЖ ДУУСГАСАН БАЙНА.'); return; }
    if(hit.trigger === 'end') { doEnd(); return; }
    if(hit.mg) { openMG(hit.mg, hit); return; }
    if(hit.quiz) { doQuiz(hit.quiz, hit); return; }
    if(hit.dlg) { startDlg(hit.dlg, hit, ()=>{ GS.done.add(hit.id); }); return; }
  }

  const door = activeLvl.door;
  if(door && Math.abs(door.wx - plr.wx) < 70 && plr.y > -20) {
    npcCool = Date.now() + 500;
    let allDone = true;
    activeLvl.npcs.forEach(n => { if(!GS.done.has(n.id) && n.trigger !== 'end') allDone = false; });
    if(!allDone) {
      toast('⚠️ ЭХЛЭЭД ЭНДХИЙН БҮХ ДААЛГАВРЫГ ДУУСГАНА УУ!');
    } else {
      if(GS.lvl < LEVELS.length - 1) showLevelTransition(door.tip);
    }
    return;
  }
}

function openComputer() {
  GS.phase = 'mg';
  document.getElementById('mg-sheet').classList.add('open');
  document.getElementById('mg-title').textContent = 'СИСТЕМИЙН ТЕРМИНАЛ';
  document.getElementById('mg-sub').textContent = 'Мэдээллийн Бааз & ЖАГСААЛТ';
  
  document.getElementById('mg-body').innerHTML = `
    <div class="card" style="margin-bottom:16px">
      <div class="lbl">📊 ТОГЛОГЧДЫН ЧАНСАА</div>
      <div id="temp-lb"></div>
    </div>
    <div class="card" style="margin-bottom:16px">
      <div class="lbl" style="color:var(--green)">🏛 БАНКНЫ ҮНДСЭН ЗАРЧИМ</div>
      <div class="term-p">Арилжааны банк нь <span class="term-hl">ПАССИВ</span> (хадгаламж, эх үүсвэр татах) болон <span class="term-hl">АКТИВ</span> (зээл олгох, хөрөнгө оруулах) удирдлагын зөрүүгээр ашиг олдог санхүүгийн байгууллага юм.</div>
    </div>
    <div class="card">
      <div class="lbl" style="color:var(--gold)">📱 ДИЖИТАЛ ШИЛЖИЛТ</div>
      <div class="term-p">Банкууд <span class="term-hl">API (Application Programming Interface)</span> ашиглан Нээлттэй банк (Open Banking) хөгжүүлснээр гуравдагч финтекүүдтэй холбогдож, зардлаа эрс бууруулж байна.</div>
    </div>
  `;
  
  const lb = [ {n:'САРУУЛ', p:420}, {n:'ТЭМҮҮЛЭН', p:350}, {n:GS.name.toUpperCase(), p:GS.pts, me:true} ].sort((a,b)=>b.p - a.p);
  document.getElementById('temp-lb').innerHTML = lb.map((x,i)=>`<div class="lb-row ${x.me?'me':''}"><span>${i+1}. ${x.n}</span><span>${x.p} ★</span></div>`).join('');
}

function showLevelTransition(tip) {
  GS.phase = 'transition';
  document.getElementById('mg-sheet').classList.add('open');
  document.getElementById('mg-title').textContent = `ҮЕ ${GS.lvl + 2} РҮҮ ШИЛЖИХ`;
  document.getElementById('mg-sub').textContent = 'СУРГАЛТЫН ТЭМДЭГЛЭЛ';
  
  document.getElementById('mg-body').innerHTML = `
    <div class="card" style="text-align:left;margin-bottom:20px;white-space:pre-wrap;line-height:1.8;color:var(--text);font-size:10px;">
      <div class="lbl" style="text-align:center;margin-bottom:16px;color:var(--accent);font-size:12px;">💡 АКАДЕМИК МЭДЛЭГ</div>
      ${tip}
    </div>
    <button class="btn gold" style="padding:20px;font-size:12px;" onclick="loadLvl(${GS.lvl + 1})">ОРОХ ▶</button>
  `;
}

let curNPC = null;
function openMG(id, npc) {
  curNPC = npc; GS.phase = 'mg';
  document.getElementById('mg-sheet').classList.add('open');
  const b = document.getElementById('mg-body');
  
  if(id === 'work') {
    document.getElementById('mg-title').textContent = 'СИСТЕМД ӨГӨГДӨЛ ОРУУЛАХ';
    document.getElementById('mg-sub').textContent = 'FREELANCE АЖИЛ';
    b.innerHTML = `
      <div class="card" style="text-align:center">
        <div style="font-size:14px;color:var(--text-dim);margin-bottom:12px">ЦАГ: <span id="fw-time" style="color:var(--red)">10</span>с</div>
        <div style="font-size:18px;color:var(--gold)">ШИВСЭН ДАТА: <span id="fw-score">0</span></div>
      </div>
      <button class="btn gold" id="fw-btn" style="height:90px;font-size:14px">💻 ХУРДАН ДАР!</button>
      <div class="res-box" id="fw-res"></div>
    `;
    let sc=0, t=10, iv=null, run=false;
    const btn = document.getElementById('fw-btn');
    btn.onclick = () => {
      if(t<=0) return;
      if(!run) {
        run=true;
        iv = setInterval(()=>{
          t--; document.getElementById('fw-time').textContent=t;
          if(t<=0){
            clearInterval(iv); btn.disabled=true;
            const earned = sc * 1500;
            GS.balance += earned; earnPts(Math.floor(sc/2), 'АЖИЛЛАВ'); updateHUD();
            addFText('+₮'+fmt(earned), plr.wx, getFloorY()-50, '#4ade80');
            GS.done.add(curNPC.id);
            const r=document.getElementById('fw-res'); r.className='res-box ok';
            r.textContent=`Хугацаа дууслаа!\nТа ${sc} дата оруулж ₮${fmt(earned)} оллоо!`;
            setTimeout(()=>{document.getElementById('mg-sheet').classList.remove('open'); GS.phase='playing'; }, 3000);
          }
        }, 1000);
      }
      sc++; document.getElementById('fw-score').textContent=sc;
      btn.style.transform = `scale(${0.95 + Math.random()*0.05})`;
      setTimeout(()=>btn.style.transform='none', 50);
    };
  }
}

let dQ=[], dIdx=0, dCb=null;
function startDlg(lines, npc, cb) {
  GS.phase = 'dlg'; dQ=lines; dIdx=0; dCb=cb;
  renderDlg();
}
function renderDlg() {
  const c = dQ[dIdx];
  if(!c) { closeDlg(); if(dCb)dCb(); return; }
  document.getElementById('dlg-name').textContent = c.s;
  document.getElementById('dlg-text').textContent = c.t;
  document.getElementById('dlg-choices').innerHTML='';
  document.getElementById('dlg-cont').style.display='block';
  document.getElementById('dlg').classList.add('open');
}
function advDlg() { dIdx++; renderDlg(); }
function closeDlg() { document.getElementById('dlg').classList.remove('open'); GS.phase='playing'; }

function doQuiz(q, npc) {
  GS.phase = 'dlg';
  document.getElementById('dlg-name').textContent = '❓ МЭРГЭЖЛИЙН АСУУЛТ';
  document.getElementById('dlg-text').textContent = q.q;
  document.getElementById('dlg-cont').style.display='none';
  const bx = document.getElementById('dlg-choices');
  bx.innerHTML='';
  
  let ans=false;

  if (q.hint) {
    const hb = document.createElement('button');
    hb.className = 'dlg-choice';
    hb.style.color = 'var(--accent)';
    hb.innerHTML = '💡 ХИНТ АВАХ <span style="color:var(--red);font-size:8px">(-5 ОНОО)</span>';
    hb.onclick = () => {
      if (ans) return;
      earnPts(-5, 'ХИНТ АШИГЛАВ');
      hb.innerHTML = `💡 ХИНТ: <span style="color:var(--text-dim)">${q.hint}</span>`;
      hb.style.color = 'var(--gold)';
      hb.onclick = null;
    };
    bx.appendChild(hb);
  }

  q.opts.forEach(o => {
    const b = document.createElement('button');
    b.className = 'dlg-choice'; b.textContent = o.t;
    b.onclick = () => {
      if(ans)return; ans=true;
      b.className = 'dlg-choice ' + (o.ok?'ok':'ng');
      const r = document.createElement('div');
      r.style.padding='16px'; r.style.fontSize='10px'; r.style.lineHeight='1.6';
      
      if(o.ok) {
        earnPts(40, 'ЗӨВ ХАРИУЛТ'); GS.balance += 20000; updateHUD();
        addFText("+₮20,000", plr.wx, getFloorY()-50, '#4ade80');
        r.style.color = 'var(--green)'; r.textContent = '✓ ' + q.ok + '\n\nШАГНАЛ: +₮20,000';
      } else {
        earnPts(-20, 'БУРУУ ХАРИУЛТ'); GS.balance -= 5000; updateHUD(); screenShake = 15;
        addFText("-20 ОНОО", plr.wx, getFloorY()-50, '#f87171');
        r.style.color = 'var(--red)'; r.textContent = '✗ ' + q.ng + '\n\nШИЙТГЭЛ: -20 ОНОО, -₮5,000';
      }
      GS.done.add(npc.id);
      bx.innerHTML=''; bx.appendChild(r);
      setTimeout(closeDlg, 4000);
    };
    bx.appendChild(b);
  });
  document.getElementById('dlg').classList.add('open');
}

document.getElementById('mg-close').onclick = ()=>{ document.getElementById('mg-sheet').classList.remove('open'); GS.phase='playing'; };

function fmt(n) { return new Intl.NumberFormat().format(n); }
function earnPts(n, m) { 
  GS.pts += n; updateHUD(); 
  toast((n>0?'+':'')+n+' ОНОО: '+m); 
}
function updateHUD() {
  document.getElementById('h-bal').textContent = `₮${fmt(GS.balance)}`;
  document.getElementById('h-pts').textContent = GS.pts;
  const p = document.getElementById('h-pts');
  p.style.color = '#fff'; setTimeout(()=>p.style.color='', 200);
}
function toast(m) {
  const t = document.createElement('div');
  t.style.cssText = 'position:fixed;top:90px;right:16px;background:rgba(0,0,0,0.9);border:2px solid var(--accent);color:#fff;padding:12px;font-size:9px;border-radius:8px;z-index:200;pointer-events:none;transition:0.3s;';
  t.textContent = m; document.body.appendChild(t);
  setTimeout(()=>{ t.style.opacity=0; setTimeout(()=>t.remove(),300); }, 2500);
}

function doEnd() {
  GS.phase = 'lb';
  const lb = [
    {n: 'АНУЖИН', p: 380}, {n: 'БАТ', p: 250}, {n: 'СУВД', p: 120},
    {n: GS.name.toUpperCase(), p: GS.pts, me: true}
  ].sort((a,b)=>b.p - a.p);
  
  const d = document.getElementById('mg-sheet');
  document.getElementById('mg-title').textContent = '🏆 ТОГЛООМ ДУУСЛАА';
  document.getElementById('mg-sub').textContent = 'ШИЛДЭГ ТОГЛОГЧИД';
  
  document.getElementById('mg-body').innerHTML = `
    <div class="card" style="text-align:left;margin-bottom:20px">
      ${lb.map((x,i)=>`<div class="lb-row ${x.me?'me':''}"><span>${i+1}. ${x.n}</span><span>${x.p} ★</span></div>`).join('')}
    </div>
    <button class="btn gold" style="padding:20px;font-size:12px" onclick="location.reload()">ШИНЭЭР ЭХЛЭХ</button>
  `;
  d.classList.add('open');
}

function loadLvl(i) {
  document.getElementById('mg-sheet').classList.remove('open');
  activeLvl = LEVELS[i]; GS.lvl = i;
  plr.wx = 100; plr.y = 0; plr.vy = 0; plr.isJumping = false; camX = 0; GS.phase = 'playing';
}

const bA = document.getElementById('abtn-a');
const bB = document.getElementById('abtn-b');
const dL = document.getElementById('dp-l');
const dR = document.getElementById('dp-r');

bA.addEventListener('touchstart', (e)=>{ e.preventDefault(); interact(); bA.style.transform='translateY(6px)'; }, {passive:false});
bA.addEventListener('touchend', (e)=>{ e.preventDefault(); bA.style.transform=''; }, {passive:false});
bA.addEventListener('mousedown', (e)=>{ e.preventDefault(); interact(); bA.style.transform='translateY(6px)'; });
bA.addEventListener('mouseup', ()=>{ bA.style.transform=''; });

bB.addEventListener('touchstart', (e)=>{ e.preventDefault(); inp.jump=true; bB.style.transform='translateY(6px)'; }, {passive:false});
bB.addEventListener('touchend', (e)=>{ e.preventDefault(); inp.jump=false; bB.style.transform=''; }, {passive:false});
bB.addEventListener('mousedown', (e)=>{ e.preventDefault(); inp.jump=true; bB.style.transform='translateY(6px)'; });
bB.addEventListener('mouseup', ()=>{ inp.jump=false; bB.style.transform=''; });

dL.addEventListener('touchstart', (e)=>{ e.preventDefault(); inp.l=true; dL.classList.add('on'); }, {passive:false});
dL.addEventListener('touchend', (e)=>{ e.preventDefault(); inp.l=false; dL.classList.remove('on'); }, {passive:false});
dL.addEventListener('mousedown', (e)=>{ e.preventDefault(); inp.l=true; dL.classList.add('on'); });
dL.addEventListener('mouseup', ()=>{ inp.l=false; dL.classList.remove('on'); });

dR.addEventListener('touchstart', (e)=>{ e.preventDefault(); inp.r=true; dR.classList.add('on'); }, {passive:false});
dR.addEventListener('touchend', (e)=>{ e.preventDefault(); inp.r=false; dR.classList.remove('on'); }, {passive:false});
dR.addEventListener('mousedown', (e)=>{ e.preventDefault(); inp.r=true; dR.classList.add('on'); });
dR.addEventListener('mouseup', ()=>{ inp.r=false; dR.classList.remove('on'); });

document.onkeydown = e => {
  if(e.key==='a'||e.key==='ArrowLeft') inp.l=true;
  if(e.key==='d'||e.key==='ArrowRight') inp.r=true;
  if(e.key==='w'||e.key==='ArrowUp'||e.key===' ') inp.jump=true;
  if(e.key==='Enter') interact();
};
document.onkeyup = e => {
  if(e.key==='a'||e.key==='ArrowLeft') inp.l=false;
  if(e.key==='d'||e.key==='ArrowRight') inp.r=false;
  if(e.key==='w'||e.key==='ArrowUp'||e.key===' ') inp.jump=false;
};

window.toggleFS = () => {
  try {
    if(!document.fullscreenElement) {
      document.documentElement.requestFullscreen().catch(()=>{ toast('⚠️ Хөтөч бүтэн дэлгэцийг хориглосон байна. iPhone: Add to Home Screen хийнэ үү.'); });
    } else document.exitFullscreen();
  } catch(e) { toast('📱 iPhone: Add to Home Screen хийнэ үү.'); }
};

window.selAv = (i) => {
  GS.av = i;
  document.querySelectorAll('.av-opt').forEach((e,j) => e.className = 'av-opt'+(i===j?' sel':''));
};

window.startGame = () => {
  const n = document.getElementById('name-inp').value.trim();
  GS.name = n || 'ТОГЛОГЧ';
  document.getElementById('title').style.display = 'none';
  document.getElementById('ctrl').style.display = 'flex';
  
  // Try to go fullscreen seamlessly if possible
  try { document.documentElement.requestFullscreen().catch(e=>{}); } catch(e){}
  
  loadLvl(0);
  updateHUD();
};

initPreviews();
setInterval(()=>requestAnimationFrame(render), 1000/60);
</script>
</body>
</html>
