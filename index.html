<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<title>Bank Quest – Slate Edition</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;height:100dvh;overflow:hidden;overscroll-behavior:none;background:#1e293b;font-family:'Press Start 2P',monospace;}

/* ── CRT OVERLAY (ЦАЙВАР БОЛГАСАН) ── */
body::after {
  content: "";
  position: absolute;
  top: 0; left: 0; width: 100vw; height: 100vh;
  background: linear-gradient(rgba(15, 23, 42, 0) 50%, rgba(0, 0, 0, 0.08) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
  background-size: 100% 4px, 6px 100%;
  pointer-events: none;
  z-index: 999;
  box-shadow: inset 0 0 80px rgba(0,0,0,0.35);
}

#c{display:block;image-rendering:pixelated;image-rendering:crisp-edges;}
#game-container { transition: transform 0.05s; }

/* ── PIXEL UI OVERLAY ── */
#ui{position:fixed;inset:0;pointer-events:none;z-index:10;}

/* HUD */
#hud{
  position:fixed;top:0;left:0;right:0;
  background:linear-gradient(to bottom, rgba(15,23,42,0.9), rgba(15,23,42,0.5));
  border-bottom:3px solid #FFD700;
  padding:12px 16px;
  display:none;align-items:center;gap:12px;
  flex-wrap:wrap;
  box-shadow: 0 6px 20px rgba(0,0,0,0.4);
  transform: translateY(-100%);
  transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
#hud.visible { transform: translateY(0); }

.hud-chip{
  background:#0f172a;border:3px solid #334155;
  padding:12px 16px;font-size:14px;color:#cbd5e1;
  display:flex;align-items:center;gap:8px;
  image-rendering:pixelated;
  box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
  border-radius: 8px;
}
.hud-chip .v{color:#FFD700; text-shadow: 0 0 8px rgba(255,215,0,0.6);}
#hud-lvbadge{
    margin-left:auto;background:#1e293b;border:3px solid #FFD700;
    padding:12px 16px;font-size:12px;color:#FFD700;
    border-radius: 8px;
    animation: pulseGlow 2s infinite;
}
@keyframes pulseGlow { 0%, 100% { box-shadow: 0 0 5px #FFD70055; } 50% { box-shadow: 0 0 15px #FFD700aa; } }

/* DIALOG BOX */
#dlg{
  position:fixed;bottom:15px;left:50%; width: 96%; max-width: 650px;
  transform:translate(-50%, 120%);
  background:rgba(15, 23, 42, 0.95);
  border:4px solid #FFD700;
  border-radius: 12px;
  padding:0;
  transition:transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  z-index:50;pointer-events:all;
  max-height:60vh;display:flex;flex-direction:column;
  box-shadow: 0 15px 40px rgba(0,0,0,0.6), inset 0 0 30px rgba(0,0,0,0.4);
  backdrop-filter: blur(12px);
}
#dlg.open{transform:translate(-50%, 0);}
#dlg-inner{display:flex;gap:16px;padding:20px;align-items:flex-start;border-bottom:3px solid #334155;}
#dlg-face-container {
    width:85px;height:85px;flex-shrink:0;
    border:3px solid #FFD700;background:#0f172a;
    position: relative; overflow: hidden; border-radius: 8px;
    box-shadow: 0 0 15px #FFD70055;
}
#dlg-face{ width: 100%; height: 100%; image-rendering:pixelated; }
#dlg-name{font-size:13px;color:#FFD700;margin-bottom:12px;letter-spacing:1px; text-shadow: 2px 2px 0 #000;}
#dlg-text{font-size:14px;color:#e2e8f0;line-height:1.8;flex:1; text-shadow: 1px 1px 0 #000;}
#dlg-cont{font-size:11px;color:#94a3b8;padding:12px 20px;text-align:right;animation:blink 1s steps(1) infinite;}
@keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
#dlg-choices{display:flex;flex-direction:column;gap:0;overflow-y:auto;}
.dlg-choice{
  background:transparent;border:none;border-top:2px solid #334155;
  padding:20px 22px;color:#cbd5e1;font-family:'Press Start 2P',monospace;
  font-size:12px;text-align:left;cursor:pointer;
  display:flex;align-items:center;gap:12px;line-height:1.6;
  transition:all 0.15s;
}
.dlg-choice:active,.dlg-choice:hover{background:#334155;color:#FFD700; padding-left: 30px;}
.dlg-choice.ok{color:#50fa7b; background: rgba(80, 250, 123, 0.15);}
.dlg-choice.ng{color:#ff5555; background: rgba(255, 85, 85, 0.15);}

/* CONTROLS (ТОМРУУЛСАН) */
#ctrl{
  position:fixed;bottom:0;left:0;right:0;
  display:none;justify-content:space-between;align-items:flex-end;
  padding:0 25px 35px;pointer-events:all;z-index:40;
}
.dpad{display:grid;grid-template-columns:85px 85px;gap:16px;}
.dpb{
  width:85px;height:85px;
  background:rgba(255,255,255,0.15);
  border:4px solid rgba(255,255,255,0.4);
  border-radius:20px;
  display:flex;align-items:center;justify-content:center;
  font-size:38px;cursor:pointer;user-select:none;
  transition:all 0.1s;
  -webkit-appearance:none;
  box-shadow: 0 8px 0 rgba(0,0,0,0.4), inset 0 2px 10px rgba(255,255,255,0.2);
  backdrop-filter: blur(5px);
}
.dpb:active,.dpb.on{
    background:rgba(255,255,255,0.35);border-color:rgba(255,255,255,0.9);
    transform: translateY(8px); box-shadow: 0 0 0 rgba(0,0,0,0), inset 0 4px 15px rgba(0,0,0,0.4);
}
.abtn{
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;user-select:none;
  -webkit-appearance:none;font-family:'Press Start 2P',monospace;
  font-weight:bold;
  transition:all 0.1s;
}
#abtn-a{
    width:90px;height:90px;font-size:20px;
    background:linear-gradient(#64748b, #334155);border:5px solid #FFD700;color:#FFD700;
    box-shadow: 0 10px 0 #aa8800, 0 15px 25px rgba(0,0,0,0.6);
}
#abtn-a:active { transform: translateY(10px); box-shadow: 0 0 0 #aa8800, 0 4px 10px rgba(0,0,0,0.8); }
#abtn-b{
    width: 75px; height: 75px; font-size: 13px; margin-right: 20px; margin-bottom: 5px;
    background:linear-gradient(#475569, #1e293b);border:4px solid #6495ED;color:#6495ED;
    box-shadow: 0 8px 0 #3355aa, 0 12px 20px rgba(0,0,0,0.6);
}
#abtn-b:active { transform: translateY(8px); box-shadow: 0 0 0 #3355aa, 0 3px 8px rgba(0,0,0,0.8); }

/* MINIGAME SHEET */
#mg-sheet{
  position:fixed;inset:0;z-index:60;
  background:rgba(15, 23, 42, 0.98);
  border-top:6px solid #6495ED;
  overflow-y:auto;
  transform:translateY(100%);
  transition:transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  pointer-events:all;
  backdrop-filter: blur(15px);
}
#mg-sheet.open{transform:translateY(0);}
#mg-hdr{
  position:sticky;top:0;
  background:linear-gradient(#1e293b, #0f172a);border-bottom:3px solid #334155;
  padding:20px 24px;display:flex;align-items:center;gap:16px;
  z-index:2; box-shadow: 0 8px 25px rgba(0,0,0,0.6);
}
#mg-title{font-size:15px;color:#FFD700;flex:1; text-shadow: 0 0 15px #FFD70055;}
#mg-sub{font-size:11px;color:#94a3b8;margin-top:10px; line-height: 1.5;}
#mg-close{
  background:#0f172a;border:3px solid #475569;
  color:#cbd5e1;font-family:'Press Start 2P',monospace;
  font-size:12px;padding:16px 20px;cursor:pointer;
  transition: all 0.1s; border-radius: 8px;
}
#mg-close:active{background:#334155; transform: scale(0.95);}
#mg-body{padding:25px; max-width: 700px; margin: 0 auto;}

/* MG UI COMPONENTS */
.px-label{font-size:12px;color:#6495ED;letter-spacing:1px;text-transform:uppercase;margin-bottom:14px;display:block;}
.px-card{background:linear-gradient(135deg, #1e293b, #0f172a);border:3px solid #334155;padding:22px;margin-bottom:18px; border-radius: 10px; box-shadow: 0 8px 20px rgba(0,0,0,0.5);}
.px-row{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:2px dashed #334155;font-size:12px;color:#cbd5e1;}
.px-row:last-child{border:none;}
.px-row.ttl{color:#FFD700;font-size:14px;border-top:3px solid #475569;padding-top:18px;}
.px-input{
  width:100%;background:#0f172a;border:3px solid #475569;
  color:#fff;font-family:'Press Start 2P',monospace;
  font-size:13px;padding:18px; border-radius: 8px;
  transition: border-color 0.2s;
}
.px-input:focus{outline:none;border-color:#6495ED; box-shadow: 0 0 15px rgba(100,149,237,0.4);}
.px-select{
  width:100%;background:#0f172a;border:3px solid #475569;
  color:#fff;font-family:'Press Start 2P',monospace;
  font-size:12px;padding:16px;-webkit-appearance:none; border-radius: 8px;
}
.px-btn{
  width:100%;background:linear-gradient(#334155, #1e293b);border:3px solid #6495ED;
  color:#6495ED;font-family:'Press Start 2P',monospace;
  font-size:15px;padding:22px;cursor:pointer;margin-top:18px;
  text-transform:uppercase;letter-spacing:2px;
  border-radius: 10px; transition: all 0.1s;
  box-shadow: 0 8px 0 #0f172a;
}
.px-btn:active{transform: translateY(8px); box-shadow: 0 0 0 #0f172a;}
.px-btn.gold{background:linear-gradient(#3f3200, #2a2000);border-color:#FFD700;color:#FFD700; box-shadow: 0 8px 0 #1a1200;}
.px-btn.gold:active{transform: translateY(8px); box-shadow: 0 0 0 #1a1200;}
.px-result{padding:20px;margin-top:18px;font-size:12px;line-height:1.8; border-radius: 8px; animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);}
@keyframes popIn { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
.px-result.ok{background:rgba(0,26,8,0.8);border:3px solid #50fa7b;color:#50fa7b;}
.px-result.ng{background:rgba(26,0,0,0.8);border:3px solid #ff5555;color:#ff5555;}
.px-info{background:rgba(30,41,59,0.8);border:3px solid #475569;padding:20px;margin-top:14px;font-size:11px;color:#93c5fd;line-height:1.8; border-radius: 8px;}

/* TITLE SCREEN */
#title{
  position:fixed;inset:0;z-index:100;
  background:#1e293b;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:25px;
  overflow:hidden;
}
#title-bg { position: absolute; inset: 0; z-index: 0; }
.t-content{position:relative;z-index:1;text-align:center;width:100%;max-width:550px; background: rgba(15,23,42,0.8); padding: 45px; border: 4px solid #334155; border-radius: 16px; backdrop-filter: blur(10px); box-shadow: 0 20px 50px rgba(0,0,0,0.5);}
.t-bank{font-size:15px;color:#6495ED;letter-spacing:5px;margin-bottom:26px; animation: float 3s ease-in-out infinite;}
@keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
.t-logo{font-size:clamp(45px,14vw,80px);color:#fff;line-height:1.1;margin-bottom:18px;text-shadow:0 10px 0 #0f172a, 0 0 45px #6495ED88;}
.t-logo span{color:#FFD700;text-shadow:0 10px 0 #aa8800, 0 0 45px #FFD70088;}
.t-sub{font-size:13px;color:#cbd5e1;margin-bottom:45px;line-height:2.2;}
.av-row{display:flex;gap:22px;justify-content:center;margin-bottom:20px;}
.av-opt{
  width:85px;height:85px;border:4px solid #334155;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;background:#0f172a;
  image-rendering:pixelated; border-radius: 12px;
  transition: all 0.2s;
}
.av-opt.sel {border-color:#FFD700;background:#1e293b; transform: scale(1.15) translateY(-8px); box-shadow: 0 15px 30px rgba(255,215,0,0.3);}
.t-btn{
  background:linear-gradient(#334155, #1e293b);border:5px solid #FFD700;
  color:#FFD700;font-family:'Press Start 2P',monospace;
  font-size:18px;padding:26px 52px;cursor:pointer;
  letter-spacing:3px;text-transform:uppercase;
  margin-top:30px; border-radius: 12px;
  box-shadow: 0 10px 0 #aa8800, 0 25px 40px rgba(0,0,0,0.6);
  transition: all 0.1s;
  animation: pulse 2s infinite;
}
.t-btn:active{transform: translateY(10px); box-shadow: 0 0 0 #aa8800, 0 10px 20px rgba(0,0,0,0.6);}
@keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

/* MAP SCREEN */
#map-screen{
  position:fixed;inset:0;z-index:70;
  background:linear-gradient(#1e293b, #334155);
  display:none;flex-direction:column;overflow-y:auto;
}
#map-hdr{padding:80px 25px 30px;text-align:center;}
#map-hdr h2{font-size:22px;color:#FFD700;margin-bottom:15px; text-shadow: 0 0 20px #FFD70055;}
#map-hdr p{font-size:12px;color:#94a3b8;}
.map-grid{display:grid;grid-template-columns:1fr 1fr;gap:25px;padding:30px;max-width:700px;margin:0 auto;}
.map-cell{
  background:rgba(30, 41, 59, 0.9);border:4px solid #475569;
  padding:30px 20px;text-align:center;cursor:pointer;
  border-radius: 12px; transition: all 0.2s;
  box-shadow: 0 10px 25px rgba(0,0,0,0.4);
}
.map-cell:active{transform: scale(0.95);}
.map-cell.done{border-color:#50fa7b; background: rgba(0, 40, 20, 0.8);}
.map-cell.lock{opacity:0.6;cursor:not-allowed; filter: grayscale(100%);}
.map-emoji{font-size:55px;margin-bottom:18px; filter: drop-shadow(0 8px 6px rgba(0,0,0,0.5));}

/* LEVEL COMPLETE */
#lc{
  position:fixed;inset:0;z-index:80;
  background:rgba(15, 23, 42, 0.96);
  display:none;flex-direction:column;
  align-items:center;justify-content:center;
  padding:30px;text-align:center;overflow-y:auto;
  backdrop-filter: blur(15px);
}
.lc-box-anim { animation: slideUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
@keyframes slideUp { 0% { transform: translateY(80px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
.lc-big{font-size:90px;margin-bottom:25px; animation: bounce 1s infinite;}
@keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-25px); } }
.lc-h{font-size:24px;color:#FFD700;margin-bottom:16px; text-shadow: 0 0 25px #FFD700aa;}
.lc-s{font-size:14px;color:#e2e8f0;margin-bottom:35px;}
.lc-pts{font-size:70px;color:#FFD700; text-shadow: 0 8px 0 #aa8800;}
.lc-max{font-size:12px;color:#94a3b8;margin-bottom:40px;}
.lc-box{background:#0f172a;border:4px solid #334155;padding:30px;margin-bottom:35px;width:100%;max-width:600px;text-align:left; border-radius: 12px;}
.lc-item{font-size:12px;color:#cbd5e1;margin-bottom:18px;display:flex;gap:18px;line-height:1.7;}
.lc-btns{display:flex;gap:25px;flex-wrap:wrap;justify-content:center;}

/* TOAST */
.px-toast{
  position:fixed;top:90px;right:25px;
  background:rgba(0, 30, 15, 0.95);border:4px solid #50fa7b;
  color:#50fa7b;font-family:'Press Start 2P',monospace;
  font-size:13px;padding:20px 25px;z-index:200;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5); border-radius: 8px;
  animation:toastPx 2.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;pointer-events:none;
}
@keyframes toastPx{
    0%{opacity:0;transform:translateX(80px) scale(0.8)}
    10%{opacity:1;transform:none scale(1)}
    85%{opacity:1;transform:none scale(1)}
    100%{opacity:0;transform:translateY(-30px) scale(0.9)}
}

/* ── ROTATE DEVICE PROMPT ── */
#rotate-prompt {
  position: fixed; inset: 0; z-index: 10000;
  background: #0f172a; color: #FFD700;
  display: none; flex-direction: column; align-items: center; justify-content: center;
  text-align: center;
}
.rot-icon { font-size: 60px; margin-bottom: 20px; animation: tiltPhone 2s infinite ease-in-out; }
@keyframes tiltPhone { 0%, 100% { transform: rotate(0deg); } 50% { transform: rotate(-90deg); } }
.rot-text { font-size: 16px; line-height: 1.8; text-shadow: 0 4px 15px rgba(255,215,0,0.5); }

/* ── MOBILE RESPONSIVENESS ── */
#game-container, #ctrl { touch-action: none; user-select: none; -webkit-user-select: none; }

@media (max-width: 768px) and (orientation: portrait) {
    #rotate-prompt { display: flex; }
    #title, #game-container, #ui, #hud, #ctrl, #dlg, #mg-sheet, #map-screen, #lc { display: none !important; }
}

@media (max-width: 768px) {
  #hud { padding-top: max(12px, env(safe-area-inset-top)); }
  #ctrl { padding-bottom: max(20px, env(safe-area-inset-bottom)); }
  
  #dlg { bottom: 140px; width: 92%; }
  #dlg-inner { padding: 15px; }
  #dlg-face-container { width: 60px; height: 60px; }
  #dlg-text { font-size: 12px; }
  .dlg-choice { padding: 15px; font-size: 11px; }
  
  .dpad { grid-template-columns: 70px 70px; gap: 12px; }
  .dpb { width: 70px; height: 70px; font-size: 30px; border-radius: 15px; }
  
  #abtn-a { width: 75px; height: 75px; font-size: 16px; }
  #abtn-b { width: 60px; height: 60px; font-size: 11px; margin-right: 15px; }
  
  .hud-chip { padding: 8px 12px; font-size: 11px; }
  #hud-lvbadge { padding: 8px 12px; font-size: 10px; }
  
  .map-grid { grid-template-columns: 1fr; gap: 15px; }
  
  .t-logo { font-size: clamp(35px, 12vw, 55px); }
  .t-btn { padding: 20px 30px; font-size: 14px; margin-top: 15px; }
  .av-opt { width: 65px; height: 65px; }
  
  .lc-big { font-size: 60px; margin-bottom: 15px; }
  .lc-pts { font-size: 50px; }
  .lc-box { padding: 20px; }
  .lc-btns { flex-direction: column; width: 100%; gap: 15px; }
  .lc-btns .px-btn { width: 100% !important; padding: 20px !important; margin: 0 !important; }
  
  #mg-body { padding: 15px; }
  .px-card { padding: 15px; }
  .px-btn { font-size: 13px; padding: 18px; }
}
</style>
</head>
<body>
<div id="rotate-prompt">
  <div class="rot-icon">📱</div>
  <div class="rot-text">ТОГЛОХЫН ТУЛД<br>УТСАА ХЭВТЭЭ БОЛГОНО УУ</div>
</div>
<div id="game-container">
    <canvas id="c"></canvas>
</div>
<div id="ui"></div>

<!-- HUD -->
<div id="hud">
  <div class="hud-chip">💰 <span class="v" id="h-bal">₮500,000</span></div>
  <div class="hud-chip">⭐ <span class="v" id="h-pts">0</span></div>
  <div id="hud-lvbadge">ҮЕ 1</div>
</div>

<!-- DIALOG -->
<div id="dlg">
  <div id="dlg-inner">
    <div id="dlg-face-container"><canvas id="dlg-face"></canvas></div>
    <div style="flex:1">
      <div id="dlg-name">СИСТЕМ</div>
      <div id="dlg-text">...</div>
    </div>
  </div>
  <div id="dlg-cont">▼ ДАР</div>
  <div id="dlg-choices"></div>
</div>

<!-- TOUCH CONTROLS -->
<div id="ctrl" oncontextmenu="return false;">
  <div class="dpad">
    <div class="dpb" id="dp-l">◀</div>
    <div class="dpb" id="dp-r">▶</div>
  </div>
  <div style="display:flex;gap:20px;align-items:flex-end;">
    <div class="abtn" id="abtn-b">MAP</div>
    <div class="abtn" id="abtn-a">A</div>
  </div>
</div>

<!-- MINIGAME -->
<div id="mg-sheet">
  <div id="mg-hdr">
    <div><div id="mg-title">MINI GAME</div><div id="mg-sub"></div></div>
    <div id="mg-close" onclick="closeMG()">✕ ХААХ</div>
  </div>
  <div id="mg-body"></div>
</div>

<!-- TITLE -->
<div id="title">
  <canvas id="title-bg"></canvas>
  <div class="t-content">
    <div class="t-bank">★ ТӨРИЙН БАНК ★</div>
    <div class="t-logo">BANK<br><span>QUEST</span></div>
    <div class="t-sub">САНХҮҮГИЙН АЯЛАЛ<br>SLATE EDITION</div>
    <div class="px-label" style="color:#cbd5e1">АВАТАР СОНГОНО УУ</div>
    <div class="av-row" id="av-row">
      <canvas class="av-opt sel" id="av0" data-i="0" onclick="selAv(0)"></canvas>
      <canvas class="av-opt" id="av1" data-i="1" onclick="selAv(1)"></canvas>
      <canvas class="av-opt" id="av2" data-i="2" onclick="selAv(2)"></canvas>
      <canvas class="av-opt" id="av3" data-i="3" onclick="selAv(3)"></canvas>

const SCALE = 5; 
const spriteCache = {};

function getSpriteKey(sprArray, palOvr, flipX) {
    let key = (sprArray === SPR_PLAYER_IDLE) ? 'idle' : 
              (sprArray === SPR_PLAYER_W1) ? 'w1' : 
              (sprArray === SPR_PLAYER_W2) ? 'w2' : 
              (sprArray === SPR_TELLER) ? 'teller' : 
              (sprArray === SPR_ADVISOR) ? 'adv' : 
              (sprArray === SPR_GUARD) ? 'guard' : 
              (sprArray === SPR_ROBOT) ? 'bot' : 
              (sprArray === SPR_ATM) ? 'atm' : 
              (sprArray === SPR_DESK) ? 'desk' : 
              (sprArray === SPR_DOOR) ? 'door' : 
              (sprArray === SPR_PLANT) ? 'plant' : 'unk';
    if (palOvr) key += '_' + JSON.stringify(palOvr);
    if (flipX) key += '_f';
    return key;
}

function preRenderSprite(spr, palOvr, flipX) {
  const size = spr.length;
  const oc = document.createElement('canvas');
  oc.width = (size + 2) * SCALE; // Add 2 pixels of padding for outline
  oc.height = (size + 2) * SCALE;
  const octx = oc.getContext('2d');
  
  const isVis = (r, c) => {
     if(r < 0 || r >= size || c < 0 || c >= size) return false;
     let pc = flipX ? size - 1 - c : c;
     return spr[r][pc] !== 0;
  };

  // 1. Draw Edge Outline (Light slate to pop from backgrounds)
  octx.fillStyle = 'rgba(15, 23, 42, 0.85)'; 
  for (let row = -1; row <= size; row++) {
    for (let col = -1; col <= size; col++) {
      if (!isVis(row, col)) {
         if (isVis(row-1, col) || isVis(row+1, col) || isVis(row, col-1) || isVis(row, col+1) ||
             isVis(row-1, col-1) || isVis(row+1, col+1) || isVis(row-1, col+1) || isVis(row+1, col-1)) {
             octx.fillRect((col+1) * SCALE, (row+1) * SCALE, SCALE, SCALE);
         }
      }
    }
  }

  // 2. Draw Main Sprite
  for (let row = 0; row < size; row++) {
    for (let col = 0; col < size; col++) {
      if (isVis(row, col)) {
        let pc = flipX ? size - 1 - col : col;
        let pidx = spr[row][pc];
        const rgba = (palOvr && palOvr[pidx]) ? palOvr[pidx] : PAL[pidx];
        octx.fillStyle = `rgba(${rgba[0]},${rgba[1]},${rgba[2]},${rgba[3]/255})`;
        octx.fillRect((col+1) * SCALE, (row+1) * SCALE, SCALE, SCALE);
      }
    }
  }
  return oc;
}

function drawSprite(ctx, spr, wx, wy, palOverrides, flipX) {
    const key = getSpriteKey(spr, palOverrides, flipX);
    if (!spriteCache[key]) {
        spriteCache[key] = preRenderSprite(spr, palOverrides, flipX);
    }
    ctx.drawImage(spriteCache[key], Math.round(wx - SCALE), Math.round(wy - SCALE));
}

let particles = [];
let actCoins = []; 

function addParticle(x, y, color, type='spark') {
  const cnt = type === 'burst' ? 20 : type === 'dust' ? 4 : 8;
  for (let i = 0; i < cnt; i++) {
    particles.push({
      x, y, 
      vx: (Math.random()-0.5) * (type==='burst'?12:5), 
      vy: (type==='dust' ? -Math.random()*2 : -Math.random()*8-3),
      life: type==='dust' ? 25 : 50, maxLife: 50, color, type,
      size: Math.random() * 8 + 4
    });
  }
}

function addFloatingText(x, y, text, color) {
    particles.push({
        x, y, vx: 0, vy: -2, life: 80, maxLife: 80, text, color, type: 'text'
    });
}

function updateParticles() {
  particles = particles.filter(p => {
    p.x += p.vx; p.y += p.vy; 
    if(p.type !== 'text') p.vy += 0.35; // gravity
    p.life--;
    return p.life > 0;
  });
}

function drawPixelText(ctx, text, x, y, color, scale=2) {
    ctx.fillStyle = color;
    ctx.font = `${8*scale}px 'Press Start 2P'`;
    ctx.fillText(text, x, y);
}

function drawParticles(ctx, camX) {
  particles.forEach(p => {
    const alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    if (p.type === 'text') {
        ctx.fillStyle = '#0f172a'; // shadow
        ctx.font = `24px 'Press Start 2P'`;
        ctx.fillText(p.text, p.x - camX + 3, p.y + 3);
        ctx.fillStyle = p.color;
        ctx.fillText(p.text, p.x - camX, p.y);
    } else {
        ctx.fillStyle = p.color;
        ctx.fillRect(Math.round(p.x - camX), Math.round(p.y), p.size, p.size);
    }
  });
  ctx.globalAlpha = 1;
}

function spawnLevelCoins(lv) {
    actCoins = [];
    if(lv.coins) {
        lv.coins.forEach(cx => {
            actCoins.push({ x: cx, y: getFloorY() - 110 - Math.random()*50, collected: false, phase: Math.random()*Math.PI*2 });
        });
    }
}

function triggerShake(amt) { screenShake = amt; }

function getFloorY() { return Math.floor(H * 0.72); }

let animTime = 0;

function drawParallaxBackground(ctx, lv, camX) {
    const bg = ctx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, lv.bgTop); bg.addColorStop(1, lv.bgBot);
    ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);

    const FY = getFloorY();
    
    // Theme specific layers
    if (lv.theme === 'city') {
        ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
        for(let i=0; i<6; i++) {
            let cx = (i * 350 + animTime * 10 - camX * 0.05) % (W + 400) - 200;
            let cy = 80 + Math.sin(i)*60;
            ctx.beginPath(); ctx.ellipse(cx, cy, 90, 35, 0, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.ellipse(cx+45, cy-25, 55, 35, 0, 0, Math.PI*2); ctx.fill();
        }
        ctx.fillStyle = '#64748b'; // far layer
        for(let i=0; i<30; i++) {
            let bx = (i * 150 - camX * 0.1) % (W + 300) - 150;
            if(bx < -200) bx += (W+400);
            let bh = 150 + (i%5)*60;
            ctx.fillRect(bx, FY - bh, 100, bh);
        }
        ctx.fillStyle = '#475569'; // mid layer
        for(let i=0; i<20; i++) {
            let bx = (i * 220 - camX * 0.3) % (W + 300) - 150;
            if(bx < -200) bx += (W+400);
            let bh = 100 + (i%3)*80;
            ctx.fillRect(bx, FY - bh, 130, bh);
            ctx.fillStyle = '#fef08a22';
            if(i%2===0) ctx.fillRect(bx+30, FY-bh+30, 30, 30);
            ctx.fillStyle = '#475569';
        }
    } else if (lv.theme === 'matrix') {
        ctx.fillStyle = '#34d39933';
        for(let i=0; i<W; i+=60) {
            let dropY = (Date.now()*0.15 + i*15) % H;
            ctx.fillRect((i - camX*0.2)%W, dropY, 8, 90);
        }
        ctx.fillStyle = '#05966955';
        for(let i=0; i<W; i+=100) {
            let dropY = (Date.now()*0.25 + i*9) % H;
            ctx.fillRect((i - camX*0.5)%W, dropY, 14, 150);
        }
    } else if (lv.theme === 'cyber') {
        ctx.strokeStyle = '#818cf844'; ctx.lineWidth = 3;
        ctx.beginPath();
        for(let i=0; i<W; i+=80) {
            let x = (i - camX*0.2)%W;
            ctx.moveTo(x, 0); ctx.lineTo(x, FY);
        }
        for(let y=0; y<FY; y+=80) {
            ctx.moveTo(0, y); ctx.lineTo(W, y);
        }
        ctx.stroke();
    } else if (lv.theme === 'future') {
        for(let i=0; i<25; i++) {
            let bx = (i * 200 - camX * 0.2) % (W + 300) - 150;
            let h = 100 + (Math.sin(i + Date.now()*0.001)*0.5+0.5) * 350;
            let grad = ctx.createLinearGradient(0, FY-h, 0, FY);
            grad.addColorStop(0, '#facc1588'); grad.addColorStop(1, '#facc1500');
            ctx.fillStyle = grad;
            ctx.fillRect(bx, FY-h, 90, h);
        }
    }
}

function render() {
  if (GS.phase === 'title' || GS.phase === 'map') return;
  const t = Date.now();
  animTime = t * 0.005;

  let sx = 0, sy = 0;
  if (screenShake > 0) {
      sx = (Math.random()-0.5) * screenShake;
      sy = (Math.random()-0.5) * screenShake;
      screenShake *= 0.85;
      if (screenShake < 0.5) screenShake = 0;
  }

  ctx.save();
  ctx.translate(sx, sy);

  const lv = LEVELS[GS.lvl];
  if(!lv) { ctx.restore(); return; }
  const FY = getFloorY();
  const CEIL_Y = Math.floor(H * 0.25);

  drawParallaxBackground(ctx, lv, camX);

  // Back Wall
  const [wr, wg, wb] = lv.wallCol;
  ctx.fillStyle = `rgb(${wr},${wg},${wb})`;
  ctx.fillRect(0, CEIL_Y, W, FY - CEIL_Y);

  // Wall Grid Pattern
  ctx.strokeStyle = `rgba(255,255,255,0.08)`;
  ctx.lineWidth = 2;
  ctx.beginPath();
  for (let y = CEIL_Y; y <= FY; y += 50) { ctx.moveTo(0, y); ctx.lineTo(W, y); }
  for (let x = -(camX % 60); x < W; x += 60) { ctx.moveTo(x, CEIL_Y); ctx.lineTo(x, FY); }
  ctx.stroke();

  // Wall Monitors / Posters
  for (let mx = 300; mx < lv.worldW; mx += 450) {
      const screenX = mx - camX;
      if (screenX > -150 && screenX < W + 150) {
        ctx.fillStyle = '#0f172a';
        ctx.fillRect(screenX, CEIL_Y + 50, 150, 100);
        
        const glow = Math.sin(t * 0.005 + mx) * 0.15 + 0.25;
        ctx.fillStyle = `rgba(${lv.accentCol[0]},${lv.accentCol[1]},${lv.accentCol[2]},${glow})`;
        ctx.fillRect(screenX + 5, CEIL_Y + 55, 140, 90);

        ctx.fillStyle = `rgba(255,255,255,0.6)`;
        ctx.fillRect(screenX + 20, CEIL_Y + 110, 20, 25);
        ctx.fillRect(screenX + 50, CEIL_Y + 90, 20, 45);
        ctx.fillRect(screenX + 80, CEIL_Y + 70, 20, 65);
        ctx.fillRect(screenX + 110, CEIL_Y + 100, 20, 35);
      }
  }

  // Wall Pillars / Lights
  ctx.fillStyle = `rgba(${lv.accentCol[0]},${lv.accentCol[1]},${lv.accentCol[2]},0.2)`;
  for (let lx = 0; lx < W + 300; lx += 300) {
    const startX = lx - (camX % 300);
    ctx.fillRect(startX, CEIL_Y, 35, FY - CEIL_Y);
    let glowAlpha = 0.25 + Math.sin(t*0.003 + lx)*0.15;
    ctx.fillStyle = `rgba(${lv.accentCol[0]},${lv.accentCol[1]},${lv.accentCol[2]},${glowAlpha})`;
    ctx.fillRect(startX-50, CEIL_Y, 135, 18);
    ctx.fillStyle = `rgba(${lv.accentCol[0]},${lv.accentCol[1]},${lv.accentCol[2]},0.2)`;
  }

  // Floor
  const [fr, fg_, fb] = lv.floorCol;
  const flrGrad = ctx.createLinearGradient(0, FY, 0, H);
  flrGrad.addColorStop(0, `rgb(${fr},${fg_},${fb})`);
  flrGrad.addColorStop(0.3, `rgb(${Math.floor(fr*0.6)},${Math.floor(fg_*0.6)},${Math.floor(fb*0.6)})`);
  flrGrad.addColorStop(1, '#0f172a');
  ctx.fillStyle = flrGrad;
  ctx.fillRect(0, FY, W, H - FY);
  
  // Floor Tiles Pattern
  ctx.strokeStyle = `rgba(0,0,0,0.2)`;
  ctx.lineWidth = 2;
  ctx.beginPath();
  for(let y = FY; y < H; y += 35) { ctx.moveTo(0, y); ctx.lineTo(W, y); }
  for(let x = -(camX % 60); x < W + 150; x += 60) { 
      ctx.moveTo(x, FY); ctx.lineTo(x - (H-FY)*0.6, H); // Skew
  }
  ctx.stroke();

  // Floor accent line
  ctx.fillStyle = `rgb(${lv.accentCol[0]},${lv.accentCol[1]},${lv.accentCol[2]})`;
  ctx.fillRect(0, FY, W, 8);

  // Ambient Particles
  if(Math.random() < 0.15) addParticle(Math.random()*W + camX, Math.random()*H, `rgba(${lv.accentCol[0]},${lv.accentCol[1]},${lv.accentCol[2]},0.6)`, 'dust');

  // Decorations
  lv.deco.forEach(d => {
    const dx = d.wx - camX;
    if (dx < -150 || dx > W + 150) return;
    const sprSize = d.spr.length;
    drawSprite(ctx, d.spr, dx - (sprSize * SCALE) / 2, FY - sprSize * SCALE, null, false);
  });

  // Door
  const dw = lv.door;
  const dScreenX = dw.wx - camX;
  if (dScreenX > -150 && dScreenX < W + 150) {
    const glow = 0.6 + Math.sin(t * 0.005) * 0.4;
    ctx.shadowColor = '#FFD700'; ctx.shadowBlur = 40 * glow;
    drawSprite(ctx, SPR_DOOR, dScreenX - 40, FY - 16 * SCALE, null, false);
    ctx.shadowBlur = 0;
    
    if (Math.abs(plr.wx - dw.wx) < 140) {
      ctx.fillStyle = 'rgba(15,23,42,0.9)';
      ctx.fillRect(dScreenX - 80, FY - 120, 160, 30);
      drawPixelText(ctx, dw.label, dScreenX - 65, FY - 98, '#FFD700', 1.8);
    }
  }

  // Coins
  actCoins.forEach(c => {
      if(c.collected) return;
      let cx = c.x - camX;
      if(cx < -50 || cx > W+50) return;
      let cy = c.y + Math.sin(animTime + c.phase)*18;
      
      let width = Math.abs(Math.cos(animTime*2 + c.phase)) * 30;
      ctx.fillStyle = '#FFD700';
      ctx.beginPath(); ctx.ellipse(cx, cy, Math.max(5, width/2), 16, 0, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#fef08a';
      ctx.beginPath(); ctx.ellipse(cx, cy, Math.max(3, width/4), 10, 0, 0, Math.PI*2); ctx.fill();
  });

  // NPCs
  lv.npcs.forEach((npc, ni) => {
    const nx = npc.wx - camX;
    if (nx < -150 || nx > W + 150) return;
    const nY = FY - 16 * SCALE;
    const bob = Math.sin(t * 0.003 + ni) * 8;

    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.beginPath(); ctx.ellipse(nx, FY - 8, 30, 10, 0, 0, Math.PI * 2); ctx.fill();

    const spr = NPC_SPRS[npc.sprIdx] || SPR_TELLER;
    drawSprite(ctx, spr, nx - 16 * SCALE / 2, nY + bob, null, false);

    const dist = Math.abs(plr.wx - npc.wx);
    if (dist < 130) {
        let tagY = nY + bob - 35;
        ctx.fillStyle = 'rgba(15,23,42,0.95)';
        ctx.fillRect(nx - 65, tagY - 24, 130, 28);
        drawPixelText(ctx, 'A: ЯРИХ', nx - 48, tagY - 4, npc.color || '#FFD700', 1.8);
        
        let ay = tagY - 40 + Math.sin(t*0.01)*10;
        ctx.fillStyle = '#FFD700';
        ctx.beginPath(); ctx.moveTo(nx-10, ay); ctx.lineTo(nx+10, ay); ctx.lineTo(nx, ay+10); ctx.fill();
    }
  });

  // PLAYER
  updatePlayer();
  const pScreenX = plr.wx - camX;
  
  const isWalking = inp.left || inp.right;
  let idleBob = isWalking ? 0 : Math.sin(t * 0.004) * 5;
  const pY = FY - plr.sprH + idleBob;

  let shadowWidth = isWalking ? 26 : 30 + Math.sin(t * 0.004) * 3;
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.beginPath(); ctx.ellipse(pScreenX, FY - 8, shadowWidth, 10, 0, 0, Math.PI * 2); ctx.fill();

  if (isWalking) {
      plr.fTimer++;
      if (plr.fTimer > 6) { plr.fTimer = 0; plr.frame = (plr.frame + 1) % 4; }
      if (plr.fTimer === 0 && Math.random() < 0.6) addParticle(plr.wx, FY, '#94a3b8', 'dust');
  } else {
      plr.frame = 0;
  }
  const frames = [SPR_PLAYER_IDLE, SPR_PLAYER_W1, SPR_PLAYER_W2, SPR_PLAYER_W1];
  const curFrame = isWalking ? frames[plr.frame] : SPR_PLAYER_IDLE;
  drawSprite(ctx, curFrame, pScreenX - plr.sprW / 2, pY, getPlayerPal(GS.av), plr.facing < 0);

  // Particles
  drawParticles(ctx, camX);

  // HUD Minimap
  if (GS.phase === 'playing' || GS.phase === 'dialog') {
      const mmW = 180, mmH = 20, mmX = W - mmW - 35, mmY = 110;
      ctx.fillStyle = 'rgba(15,23,42,0.9)'; ctx.fillRect(mmX - 8, mmY - 8, mmW + 16, mmH + 16);
      ctx.fillStyle = `rgba(${lv.accentCol[0]},${lv.accentCol[1]},${lv.accentCol[2]},0.35)`;
      ctx.fillRect(mmX, mmY, mmW, mmH);
      const mmPx = mmX + Math.max(0, Math.min(1, plr.wx / lv.worldW)) * mmW;
      ctx.fillStyle = '#FFD700'; ctx.fillRect(mmPx - 5, mmY - 5, 10, mmH + 10);
      const mmDx = mmX + (lv.door.wx / lv.worldW) * mmW;
      ctx.fillStyle = '#fca5a5'; ctx.fillRect(mmDx - 4, mmY, 8, mmH);
  }

  ctx.restore();
}

function updatePlayer() {
  if (GS.phase !== 'playing') return;
  const lv = LEVELS[GS.lvl];
  if (!lv) return;

  if (inp.left) { plr.wx -= plr.spd; plr.facing = -1; }
  if (inp.right) { plr.wx += plr.spd; plr.facing = 1; }
  plr.wx = Math.max(50, Math.min(lv.worldW - 50, plr.wx));

  actCoins.forEach(c => {
      if(!c.collected && Math.abs(plr.wx - c.x) < 55) {
          c.collected = true;
          addParticle(c.x, c.y, '#FFD700', 'burst');
          addFloatingText(c.x, c.y - 35, '+10', '#FFD700');
          earnPts(10, ''); 
          triggerShake(10);
      }
  });

  const dL = W * 0.4, dR = W * 0.6;
  const sx = plr.wx - targetCamX;
  if (sx < dL) targetCamX = Math.max(0, plr.wx - dL);
  else if (sx > dR) targetCamX = Math.min(lv.worldW - W, plr.wx - dR);
  
  camX += (targetCamX - camX) * 0.12; 

  if (Math.abs(plr.wx - lv.door.wx) < 60) triggerDoor();
}

let npcCooldown = 0;
function interact() {
  if (GS.phase === 'dialog') { advDlg(); return; }
  if (GS.phase !== 'playing') return;
  if (Date.now() < npcCooldown) return;
  
  const lv = LEVELS[GS.lvl];
  for (const npc of lv.npcs) {
    if (Math.abs(plr.wx - npc.wx) < 130) {
      triggerNPC(npc);
      return;
    }
  }
}

function triggerDoor() {
  if (GS.phase !== 'playing') return;
  if (GS.lvl >= LEVELS.length - 1) { triggerEnd(); return; }
  doLevelComplete();
}

function triggerNPC(npc) {
  npcCooldown = Date.now() + 500;
  addParticle(npc.wx, getFloorY() - 110, npc.color || '#FFD700', 'burst');

  if (npc.trigger === 'finalEnd') { startDialog(npc.dialog, npc, () => triggerEnd()); return; }
  if (npc.mg) { startDialog(npc.dialog, npc, () => openMG(npc.mg)); return; }
  if (npc.quiz) { startDialog(npc.dialog, npc, () => startQuiz(npc.quiz)); return; }
  startDialog(npc.dialog, npc, null);
}

function triggerEnd() {
  GS.done.add(GS.lvl);
  showFinalComplete();
}

let dlgQueue = [], dlgIdx = 0, dlgCb = null, dlgNPC = null;

function startDialog(msgs, npc, cb) {
  GS.phase = 'dialog';
  dlgQueue = msgs; dlgIdx = 0; dlgCb = cb; dlgNPC = npc;
  inp.left = false; inp.right = false; 
  renderDlgStep();
}

function renderDlgStep() {
  const msg = dlgQueue[dlgIdx];
  if (!msg) { closeDlg(); return; }
  
  const dlgEl = document.getElementById('dlg');
  dlgEl.classList.remove('open');
  
  setTimeout(() => {
      if (dlgNPC) drawNPCFace(document.getElementById('dlg-face'), dlgNPC.faceIdx || 0);
      document.getElementById('dlg-name').textContent = msg.speaker || '';
      document.getElementById('dlg-name').style.color = dlgNPC ? (dlgNPC.color || '#FFD700') : '#FFD700';
      document.getElementById('dlg-text').textContent = msg.text;
      document.getElementById('dlg-cont').style.display = dlgIdx < dlgQueue.length - 1 ? 'block' : 'none';
      document.getElementById('dlg-choices').innerHTML = '';
      dlgEl.classList.add('open');
  }, 10);
}

function advDlg() {
  if (GS.phase !== 'dialog') return;
  dlgIdx++;
  if (dlgIdx >= dlgQueue.length) {
    closeDlg();
    if (dlgCb) { const cb = dlgCb; dlgCb = null; cb(); }
  } else renderDlgStep();
}

function closeDlg() {
  document.getElementById('dlg').classList.remove('open');
  document.getElementById('dlg-choices').innerHTML = '';
  GS.phase = 'playing';
}

function startQuiz(quiz) {
  GS.phase = 'dialog';
  document.getElementById('dlg-name').textContent = '❓ АСУУЛТ';
  document.getElementById('dlg-name').style.color = '#fff';
  document.getElementById('dlg-text').textContent = quiz.q;
  document.getElementById('dlg-cont').style.display = 'none';
  document.getElementById('dlg').classList.add('open');
  const ca = document.getElementById('dlg-choices');
  ca.innerHTML = '';
  let answered = false;
  
  quiz.ch.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'dlg-choice';
    btn.innerHTML = `<span style="font-size:24px">${c.i}</span> <span>${c.t}</span>`;
    btn.onclick = () => {
      if (answered) return; answered = true;
      btn.className = 'dlg-choice ' + (c.ok ? 'ok' : 'ng');
      if(c.ok) triggerShake(15); else triggerShake(10);
      earnPts(c.ok ? quiz.rw : Math.floor(quiz.rw * 0.3), c.ok ? 'ЗӨВ ХАРИУЛТ' : 'ХАРИУЛТ');
      ca.innerHTML = '';
      
      const fb = document.createElement('div');
      fb.style.cssText = `padding:22px;font-size:13px;line-height:1.8;color:${c.ok?'#50fa7b':'#ff5555'}; text-shadow: 1px 1px 0 #000;`;
      fb.textContent = c.ok ? quiz.gf : quiz.bf;
      ca.appendChild(fb);
      
      if (quiz.info) {
        const inf = document.createElement('div');
        inf.style.cssText = 'padding:18px 22px;font-size:11px;color:#93c5fd;line-height:1.8;border-top:2px dashed #475569; background:rgba(0,0,0,0.5);';
        inf.textContent = quiz.info;
        ca.appendChild(inf);
      }
      
      const nb = document.createElement('button');
      nb.className = 'dlg-choice'; nb.style.justifyContent = 'center'; nb.style.color = '#FFD700';
      nb.textContent = '▶ ҮРГЭЛЖЛҮҮЛЭХ';
      nb.onclick = () => { closeDlg(); if(dlgCb){const cb=dlgCb;dlgCb=null;cb();} };
      ca.appendChild(nb);
    };
    ca.appendChild(btn);
  });
}

function renderMGBudget(el) {
  const cats=[
    {e:'🏠',n:'БАЙР',k:'rent',d:150000,m:250000}, {e:'🍽',n:'ХООЛ',k:'food',d:100000,m:200000},

  ];
  const v={}; cats.forEach(c=>v[c.k]=c.d);
  const INC=500000; let done=false;
  el.innerHTML=`
    <span class="px-label">ОРЛОГО: <span style="color:#FFD700">₮500,000</span></span>
    <div id="bg-rows" class="px-card"></div>
    <div class="px-card">
      <div class="px-row"><span>ЗАРЦУУЛАЛТ</span><span id="bg-used" style="color:#ff5555">₮500,000</span></div>
      <div class="px-row"><span>ҮЛДЭГДЭЛ</span><span id="bg-rem" style="color:#50fa7b">₮0</span></div>
    </div>
    <button class="px-btn gold" onclick="submitBG()">★ БАТАЛГААЖУУЛАХ</button>
    <div id="bg-res"></div>
  `;
  const rows=document.getElementById('bg-rows');
  cats.forEach(c=>{
    rows.innerHTML+=`<div class="px-row" style="border:none"><span style="width:110px">${c.e} ${c.n}</span><input type="range" class="budget-slider" style="flex:1; margin:0 15px;" min="0" max="${c.m}" step="5000" value="${c.d}" oninput="updBG('${c.k}',this.value)"><span style="width:85px;text-align:right;color:#6495ED" id="bgv-${c.k}">₮${fmt(c.d)}</span></div>`;
  });
  window.updBG=(k,val)=>{
    v[k]=+val; document.getElementById(`bgv-${k}`).textContent=`₮${fmt(+val)}`;
    const tot=Object.values(v).reduce((a,b)=>a+b,0); const rem=INC-tot;
    document.getElementById('bg-used').textContent=`₮${fmt(tot)}`;
    document.getElementById('bg-used').style.color=rem>=0?'#50fa7b':'#ff5555';
    document.getElementById('bg-rem').textContent=`₮${fmt(Math.abs(rem))}${rem<0?' (ХЭТЭРСЭН)':''}`;
    document.getElementById('bg-rem').style.color=rem>=0?'#50fa7b':'#ff5555';
  };
  window.submitBG=()=>{
    if(done)return;

    if(tot>INC){ triggerShake(15); toast('ЗАРЛАГА ХЭТЭРЛЭЭ!'); return; }
    done=true; const sp=Math.round(v.save/INC*100);
    earnPts(sp>=15?50:sp>=5?35:20,'САРЫН ТӨСӨВ'); triggerShake(12);
    document.getElementById('bg-res').className='px-result ok'; 
    document.getElementById('bg-res').textContent=`★ ${sp}% ХАДГАЛЛАА! ${sp>=15?'МАШ САЙН!':'15%+ ЗОРЬОРООЙ.'}`;
    setTimeout(closeMG,2500);
  };
}

function renderMGShopping(el) {
  const items=[ {e:'🍞',n:'ТАЛХ',p:3500},{e:'🥛',n:'СҮҮ',p:4200}, {e:'🥚',n:'ӨНДӨГ',p:8900},{e:'🍎',n:'АЛИМ',p:6000} ];

function doLevelComplete() {
  if (GS.phase === 'lc') return;
  GS.done.add(GS.lvl); GS.phase = 'lc';
  inp.left=false; inp.right=false;
  
  const lv = LEVELS[GS.lvl];
  document.getElementById('lc-em').textContent = lv.emoji;
  document.getElementById('lc-h').textContent = `ҮЕ ${lv.id} ДУУССАН!`;
  document.getElementById('lc-s').textContent = lv.name;
  
  let currentScore = 0;
  const targetScore = GS.pts;
  const ptsEl = document.getElementById('lc-pts');
  
  const lessons = ['ХАРИЛЦАХ ДАНС + ДЕБИТ КАРТ','МОБАЙЛ БАНК + КИБЕР АЮУЛГҮЙ БАЙДАЛ','ОЛОН УЛС ГҮЙЛГЭЭ + ФИНТЕК','ХӨРӨНГӨ ОРУУЛАЛТ + ЗЭЭЛ'];
  document.getElementById('lc-box').innerHTML = `<div style="font-size:13px;color:#6495ED;margin-bottom:18px; border-bottom:2px solid #334155; padding-bottom:14px">★ СУРАЛЦСАН:</div>` + lessons.slice(0, lv.id).map(l => `<div class="lc-item"><span style="color:#50fa7b; font-size:15px">✓</span><span>${l}</span></div>`).join('');
  
  const nb = document.getElementById('lc-next');
  if (GS.lvl >= LEVELS.length - 1) { nb.textContent = '★ ДУУСГАХ'; nb.onclick = showFinalComplete; } 
  else { nb.textContent = `ҮЕ ${GS.lvl + 2} ▶`; nb.onclick = goNext; }
  
  document.getElementById('lc').style.display = 'flex';
  
  const iv = setInterval(() => {
      currentScore += Math.ceil((targetScore - currentScore)*0.2) + 1;
      if(currentScore >= targetScore) { currentScore = targetScore; clearInterval(iv); }
      ptsEl.textContent = currentScore;
  }, 30);
}

function showFinalComplete() {
  GS.done.add(GS.lvl); GS.phase = 'lc';
  document.getElementById('lc-em').textContent = '🏆';
  document.getElementById('lc-h').textContent = 'БАЯР ХҮРГЭЕ!';
  document.getElementById('lc-s').textContent = 'САНХҮҮГИЙН МАСТЕР БОЛЛОО!';
  document.getElementById('lc-pts').textContent = GS.pts;
  const rank = GS.pts >= 400 ? '★★★ МАСТЕР' : GS.pts >= 250 ? '★★ МЭРГЭЖИЛТЭН' : '★ СУРАЛЦАГЧ';
  document.getElementById('lc-box').innerHTML = `<div style="font-size:18px;color:#FFD700;margin-bottom:18px;text-align:center;animation:pulse 1.5s infinite">${rank}</div>`;
  document.getElementById('lc-next').textContent = '★ ДАХИН ТОГЛОХ';
  document.getElementById('lc-next').onclick = restartGame;
  document.getElementById('lc').style.display = 'flex';
}

window.goMap = function() {
  document.getElementById('lc').style.display = 'none';
  renderMap(); document.getElementById('map-screen').style.display = 'flex'; GS.phase = 'map';
};
window.goNext = function() {
  document.getElementById('lc').style.display = 'none';
  const next = GS.lvl + 1;
  if (next >= LEVELS.length) { showFinalComplete(); return; }
  loadLevel(next);
};

function loadLevel(idx) {
  GS.lvl = idx; GS.phase = 'playing';
  plr.wx = 150; camX = 0; targetCamX = 0;
  spawnLevelCoins(LEVELS[idx]);
  particles = [];
  document.getElementById('lc').style.display = 'none';
  document.getElementById('map-screen').style.display = 'none';
  document.getElementById('hud-lvbadge').textContent = `ҮЕ ${idx + 1}`;
  updateHUD();
  toast(`▶ ҮЕ ${idx + 1} — ${LEVELS[idx].name}`);
}

function restartGame() {
  GS.balance = 500000; GS.pts = 0; GS.done.clear();
  document.getElementById('lc').style.display = 'none'; updateHUD(); loadLevel(0);
}

function renderMap() {
  const g = document.getElementById('map-grid');
  g.innerHTML = LEVELS.map((lv, i) => {
    const done = GS.done.has(i); const locked = i > 0 && !GS.done.has(i - 1);
    return `<div class="map-cell ${done?'done':''} ${locked?'lock':''}" onclick="${locked?`toast('ӨМНӨХ ҮЕЭ ДУУСГААРАЙ!')`:('mapGo('+i+')')}">
      <div class="map-emoji">${lv.emoji}</div>
      <div style="font-size:12px;color:#94a3b8;margin-bottom:10px;">ҮЕ ${lv.id}</div>
      <div style="font-size:14px;color:#fff;margin-bottom:16px; line-height:1.5">${lv.name}</div>
      <div style="font-size:12px;color:${done?'#50fa7b':locked?'#94a3b8':'#6495ED'}; font-weight:bold;">${done?'✓ ДУУССАН':locked?'🔒 ТҮГЖИГДСЭН':'▶ ТОГЛОХ'}</div>
    </div>`;
  }).join('');
}
window.mapGo = function(i) { document.getElementById('map-screen').style.display = 'none'; loadLevel(i); };

let stars = Array.from({ length: 150 }, () => ({
  x: Math.random() * window.innerWidth, y: Math.random() * window.innerHeight,
  s: Math.random() * 3 + 1, v: Math.random() * 0.8 + 0.2, a: Math.random()
}));

function animTitle() {
  if (GS.phase !== 'title') return;
  tc.width = window.innerWidth; tc.height = window.innerHeight;
  tctx.fillStyle = '#1e293b'; tctx.fillRect(0, 0, tc.width, tc.height);

  tctx.strokeStyle = '#6495ED15'; tctx.lineWidth = 2;
  tctx.beginPath();
  for(let i=0; i<tc.width; i+=60) { tctx.moveTo(i,0); tctx.lineTo(i,tc.height); }
  for(let i=0; i<tc.height; i+=60) { tctx.moveTo(0,i); tctx.lineTo(tc.width,i); }
  tctx.stroke();

  stars.forEach(s => {
    s.y -= s.v; if (s.y < 0) { s.y = tc.height; s.x = Math.random() * tc.width; }
    s.a += 0.05;
    let alpha = (Math.sin(s.a) * 0.5 + 0.5) * 0.8;
    tctx.fillStyle = `rgba(148, 163, 184, ${alpha})`;
    tctx.fillRect(s.x, s.y, s.s, s.s);
  });
  requestAnimationFrame(animTitle);
}

window.selAv = function(i) {
  GS.av = i;
  document.querySelectorAll('.av-opt').forEach((el, j) => {
    el.className = 'av-opt' + (j === i ? ' sel' : '');
  });
};

function requestFullScreen() {
  const doc = window.document.documentElement;
  const reqFn = doc.requestFullscreen || doc.mozRequestFullScreen || doc.webkitRequestFullScreen || doc.msRequestFullscreen;
  if (reqFn) {
    reqFn.call(doc).then(() => {
      // Дэлгэц эргэхийг хэвтээ (landscape) горимд түгжих гэж оролдох
      if (screen.orientation && screen.orientation.lock) {
        screen.orientation.lock('landscape').catch(e => console.log('Orientation lock unsupported:', e));
      }
    }).catch(err => console.log('Fullscreen failed:', err));
  }
}

window.startGame = function() {
  requestFullScreen();
  GS.phase = 'playing';
  document.getElementById('title').style.display = 'none';
  document.getElementById('ctrl').style.display = 'flex';
  document.getElementById('hud').style.display = 'flex';
  
  setTimeout(()=> document.getElementById('hud').classList.add('visible'), 100);
  
  loadLevel(0);
};

const dpL = document.getElementById('dp-l');
const dpR = document.getElementById('dp-r');

dpL.addEventListener('touchend', e => { e.preventDefault(); inp.left = false; dpL.classList.remove('on'); }, { passive: false });
dpR.addEventListener('touchstart', e => { e.preventDefault(); inp.right = true; dpR.classList.add('on'); }, { passive: false });
dpR.addEventListener('touchend', e => { e.preventDefault(); inp.right = false; dpR.classList.remove('on'); }, { passive: false });
dpL.addEventListener('mousedown', e => { e.preventDefault(); inp.left = true; dpL.classList.add('on'); });
dpL.addEventListener('mouseup', e => { e.preventDefault(); inp.left = false; dpL.classList.remove('on'); });

document.getElementById('abtn-a').addEventListener('touchstart', e=>{e.preventDefault(); interact();});
document.getElementById('abtn-a').addEventListener('mousedown', e=>{e.preventDefault(); interact();});
document.getElementById('abtn-b').addEventListener('click', () => {
  if (GS.phase === 'playing') { renderMap(); document.getElementById('map-screen').style.display = 'flex'; GS.phase = 'map'; } 
  else if (GS.phase === 'map') { document.getElementById('map-screen').style.display = 'none'; GS.phase = 'playing'; }
});

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft' || e.key === 'a') inp.left = true;
  if (e.key === 'ArrowRight' || e.key === 'd') inp.right = true;
  if (e.key === ' ' || e.key === 'Enter') interact();
  if (e.key === 'm' || e.key === 'M') document.getElementById('abtn-b').click();
});
document.addEventListener('keyup', e => {
  if (e.key === 'ArrowLeft' || e.key === 'a') inp.left = false;
  if (e.key === 'ArrowRight' || e.key === 'd') inp.right = false;
});

document.getElementById('dlg').addEventListener('click', e => { if (e.target.tagName !== 'BUTTON') advDlg(); });
document.addEventListener('touchmove', e => { if(GS.phase==='playing') e.preventDefault(); }, { passive: false });

function fmt(n) { return new Intl.NumberFormat('mn-MN').format(n); }
function earnPts(n, label) { 
    GS.pts += n; updateHUD(); 
    if(label) toast(`+${n} ★ ${label}`); 
    
    const ptsEl = document.getElementById('h-pts');
    ptsEl.style.transform = 'scale(1.8)';
    ptsEl.style.color = '#fff';
    setTimeout(()=> { ptsEl.style.transform = 'scale(1)'; ptsEl.style.color = '#FFD700'; }, 200);
}
function updateHUD() {
  document.getElementById('h-bal').textContent = `₮${fmt(GS.balance)}`;
  document.getElementById('h-pts').textContent = GS.pts;
}
function toast(msg) {
  const t = document.createElement('div'); t.className = 'px-toast'; t.textContent = msg;
  document.body.appendChild(t); setTimeout(() => t.remove(), 2500);
}

function loop() {
  render();
  requestAnimationFrame(loop);
}

for (let i = 0; i < 4; i++) drawAvatarPreview(document.getElementById(`av${i}`), i);
animTitle();
loop();
